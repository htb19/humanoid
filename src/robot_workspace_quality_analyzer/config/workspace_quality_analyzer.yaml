workspace_quality_analyzer:
  ros__parameters:
    move_group_name: "right_arm"
    ee_link: ""
    base_frame: "base_link"
    robot_description_param: "robot_description"

    sample_shape: "box"
    x_range: [-0.25, 0.25]
    y_range: [-0.25, 0.25]
    z_range: [-0.15, 0.25]
    resolution: 0.05

    ik_timeout: 0.02
    state_wait_timeout: 2.0

    sigma_min_warn: 0.05
    sigma_min_bad: 0.02
    condition_warn: 80.0
    condition_bad: 200.0

    joint_margin_warn: 0.08
    joint_margin_bad: 0.03

    q_distance_warn: 0.35
    q_distance_bad: 0.65

    sigma_min_good: 0.12
    joint_margin_good: 0.20

    csv_output_dir: "/tmp/workspace_quality"
    marker_topic: "/workspace_quality/markers"
    best_pose_topic: "/workspace_quality/best_pose"
    publish_markers: true
    marker_scale: 0.025
