demo_recorder:
  ros__parameters:
    save_root: "data/imitation_raw"
    sample_rate_hz: 10.0
    min_joint_state_hz: 5.0
    min_camera_hz: 5.0
    stale_topic_warn_sec: 1.0
    image_format: "jpg"
    jpeg_quality: 92
    action_mode: "joint_position_targets"
    require_joint_state_before_start: true

    joint_state_topic: "/joint_states"
    left_joint_command_topic: "/left_joint_command"
    right_joint_command_topic: "/right_joint_command"
    neck_joint_command_topic: "/neck_joint_command"
    left_gripper_topic: "/open_left_gripper"
    right_gripper_topic: "/open_right_gripper"

    left_joint_names:
      - left_base_pitch_joint
      - left_shoulder_roll_joint
      - left_shoulder_yaw_joint
      - left_elbow_pitch_joint
      - left_wrist_pitch_joint
      - left_wrist_yaw_joint
    right_joint_names:
      - right_base_pitch_joint
      - right_shoulder_roll_joint
      - right_shoulder_yaw_joint
      - right_elbow_pitch_joint
      - right_wrist_pitch_joint
      - right_wrist_yaw_joint
    neck_joint_names:
      - neck_pitch_joint
      - neck_yaw_joint
    gripper_joint_names:
      - left_gripper1_joint
      - right_gripper1_joint

    camera_names:
      - rgb_head
    camera_topics:
      - /head_camera/image
    camera_enabled:
      - true

    optional_camera_names:
      - rgb_wrist_left
      - rgb_wrist_right
    optional_camera_topics:
      - /left_camera/image
      - /right_camera/image
    optional_camera_enabled:
      - false
      - false
